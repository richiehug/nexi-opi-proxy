openapi: 3.1.0
info:
  title: Nexi OPI Proxy API
  version: 1.0.4
  description: |
    HTTP and JSON API for Nexi OPI Proxy.

    The proxy exposes a local API for Swiss Nexi terminal integrations while handling OPI XML and TCP internally.
servers:
  - url: http://127.0.0.1:3001
    description: Local HTTP runtime
  - url: https://127.0.0.1:3001
    description: Local HTTPS runtime
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  parameters:
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: Reuse the same key with the same route, async preference, and JSON body to receive the same response again. Reusing a key with different request content returns HTTP 409.
      schema:
        type: string
        minLength: 1
  schemas:
    HealthResponse:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
        version:
          type: string
    ErrorField:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/ErrorField'
    ErrorResponse:
      type: object
      required: [error, requestId]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
        requestId:
          type: string
    ReceiptHandling:
      type: object
      properties:
        customer:
          type: string
          enum: [external, local, unavailable]
        merchant:
          type: string
          enum: [external, local, unavailable]
    ResponseMode:
      type: string
      enum: [sync, async]
      description: Overrides the configured response mode for async-enabled terminal operations.
    AsyncAcceptedResponse:
      type: object
      required: [transactionId, status, terminalAlias]
      properties:
        transactionId:
          type: string
        status:
          type: string
          enum: [pending]
        terminalAlias:
          type: string
    PaymentRequest:
      type: object
      required: [reference, amount]
      properties:
        reference:
          type: string
        amount:
          type: number
          minimum: 0
        cashback:
          type: number
          minimum: 0
        currency:
          type: string
        language:
          type: string
        autoCapture:
          type: boolean
        shiftNumber:
          type: integer
          minimum: 0
        clerkId:
          type: string
        requestTransactionInformation:
          type: boolean
        requestToken:
          type: boolean
        requestFullPan:
          type: boolean
        requestReceiptHeader:
          type: boolean
        paymentMethods:
          type: array
          items:
            type: string
        receiptHandling:
          $ref: '#/components/schemas/ReceiptHandling'
        forceAcceptance:
          type: boolean
        orderType:
          type: string
          enum: [mail, phone]
        card:
          type: object
          properties:
            number:
              type: string
            expiryMonth:
              type: integer
            expiryYear:
              type: integer
        responseMode:
          $ref: '#/components/schemas/ResponseMode'
    RefundRequest:
      type: object
      required: [reference, amount]
      properties:
        reference:
          type: string
        amount:
          type: number
        currency:
          type: string
        language:
          type: string
        shiftNumber:
          type: integer
          minimum: 0
        clerkId:
          type: string
        paymentMethods:
          type: array
          items:
            type: string
        receiptHandling:
          $ref: '#/components/schemas/ReceiptHandling'
        responseMode:
          $ref: '#/components/schemas/ResponseMode'
    FollowUpRequest:
      type: object
      properties:
        amount:
          type: number
        terminalAlias:
          type: string
        currency:
          type: string
        language:
          type: string
        shiftNumber:
          type: integer
          minimum: 0
        clerkId:
          type: string
        paymentMethods:
          type: array
          items:
            type: string
        receiptHandling:
          $ref: '#/components/schemas/ReceiptHandling'
        responseMode:
          $ref: '#/components/schemas/ResponseMode'
    ServiceRequest:
      type: object
      properties:
        currency:
          type: string
        language:
          type: string
        shiftNumber:
          type: integer
          minimum: 0
        clerkId:
          type: string
        receiptHandling:
          $ref: '#/components/schemas/ReceiptHandling'
        responseMode:
          $ref: '#/components/schemas/ResponseMode'
    ReceiptItem:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
        target:
          type: string
        filename:
          type: string
        location:
          type: string
        createdAt:
          type: string
          format: date-time
        contentType:
          type: string
        sizeBytes:
          type: integer
        receiptBody:
          type: string
    ReceiptSummary:
      type: object
      properties:
        count:
          type: integer
        customerReceipt:
          type: boolean
        merchantReceipt:
          type: boolean
        location:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              role:
                type: string
              target:
                type: string
              createdAt:
                type: string
                format: date-time
              contentType:
                type: string
    Transaction:
      type: object
      properties:
        transactionId:
          type: string
        parentTransactionId:
          type: string
        reference:
          type: string
        amount:
          type: string
        totalAmount:
          type: string
        cashback:
          type: string
        currency:
          type: string
        terminalAlias:
          type: string
        deviceTerminalId:
          type: string
        type:
          type: string
        paymentKind:
          type: string
        status:
          type: string
        paymentMethod:
          type: string
        overallResult:
          type: string
        recoveryNote:
          type: string
        receipts:
          $ref: '#/components/schemas/ReceiptSummary'
        operations:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TransactionSuccess:
      type: object
      properties:
        transactionId:
          type: string
        parentTransactionId:
          type: string
        reference:
          type: string
        amount:
          type: string
        totalAmount:
          type: string
        cashback:
          type: string
        currency:
          type: string
        terminalAlias:
          type: string
        deviceTerminalId:
          type: string
        status:
          type: string
        paymentMethod:
          type: string
        receipts:
          $ref: '#/components/schemas/ReceiptSummary'
        requestId:
          type: string
    TransactionReadEnvelope:
      type: object
      properties:
        message:
          type: string
        transaction:
          $ref: '#/components/schemas/Transaction'
        requestId:
          type: string
    ReceiptBundleEnvelope:
      type: object
      properties:
        transaction:
          $ref: '#/components/schemas/Transaction'
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/ReceiptItem'
        requestId:
          type: string
    ServiceReceiptItem:
      type: object
      properties:
        id:
          type: string
        operation:
          type: string
        requestId:
          type: string
        opiRequestType:
          type: string
        role:
          type: string
        title:
          type: string
        target:
          type: string
        filename:
          type: string
        location:
          type: string
        createdAt:
          type: string
          format: date-time
        contentType:
          type: string
        sizeBytes:
          type: integer
    TerminalReceiptItem:
      allOf:
        - $ref: '#/components/schemas/ServiceReceiptItem'
        - type: object
          properties:
            body:
              type: string
    TerminalReceiptBundle:
      type: object
      properties:
        sourceType:
          type: string
          enum: [transaction, service]
        operation:
          type: string
        opiRequestType:
          type: string
        transaction:
          $ref: '#/components/schemas/Transaction'
        service:
          type: object
          properties:
            operation:
              type: string
            requestId:
              type: string
            opiRequestType:
              type: string
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/TerminalReceiptItem'
    TerminalReceiptLatestEnvelope:
      type: object
      properties:
        terminalAlias:
          type: string
        receipt:
          $ref: '#/components/schemas/TerminalReceiptBundle'
        requestId:
          type: string
    TerminalReceiptListEnvelope:
      type: object
      properties:
        terminalAlias:
          type: string
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/TerminalReceiptBundle'
        requestId:
          type: string
    SupportedBrand:
      type: object
      properties:
        code:
          type: string
        paymentMethod:
          type: string
        displayName:
          type: string
        module:
          type: string
    ReconciliationSummary:
      type: object
      properties:
        shiftNumber:
          type: string
        clerkId:
          type: string
        status:
          type: string
        firstTransactionDate:
          type: string
        lastTransactionDate:
          type: string
        circuitTotals:
          type: array
          items:
            type: object
            properties:
              cardCircuit:
                type: string
              numberOfPayments:
                type: string
              acquirer:
                type: string
              totalAmount:
                type: string
              currency:
                type: string
    TerminalServiceSuccess:
      type: object
      properties:
        message:
          type: string
        terminalAlias:
          type: string
        operation:
          type: string
        opiRequestType:
          type: string
        status:
          type: string
        deviceTerminalId:
          type: string
        terminalIp:
          type: string
        appVersion:
          type: string
        ep2Mid:
          type: string
        terminalStatus:
          type: string
        terminalSubStatus:
          type: string
        initialisedAcquirers:
          type: array
          items:
            type: string
        supportedBrands:
          type: array
          items:
            $ref: '#/components/schemas/SupportedBrand'
        reconciliation:
          $ref: '#/components/schemas/ReconciliationSummary'
        details:
          type: object
          additionalProperties: true
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/ServiceReceiptItem'
        terminalMessages:
          type: array
          items:
            type: string
        requestId:
          type: string
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /terminals/{terminalAlias}/info:
    get:
      summary: Read terminal info
      description: Returns terminal identity, software, network, service-center, acquirer, and available card-circuit information gathered through the proxy.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Terminal info
          content:
            application/json:
              schema:
                type: object
                properties:
                  terminalAlias:
                    type: string
                  terminalMessages:
                    type: array
                    items:
                      type: string
                  paymentMethods:
                    type: array
                    items:
                      $ref: '#/components/schemas/SupportedBrand'
                  info:
                    type: object
                    additionalProperties: true
                  receipt:
                    type: object
                    properties:
                      type:
                        type: string
                      text:
                        type: string
                  requestId:
                    type: string
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /terminals/{terminalAlias}/status:
    get:
      summary: Read terminal status
      description: Returns live terminal status from the terminal plus the proxy's cached status, reachability, and last status-change metadata.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Terminal status
          content:
            application/json:
              schema:
                type: object
                properties:
                  terminalAlias:
                    type: string
                  status:
                    type: string
                  statusSource:
                    type: string
                  lastStatusChangeAt:
                    type: string
                    format: date-time
                  reachable:
                    type: boolean
                  device:
                    type: object
                    additionalProperties: true
                  services:
                    type: object
                    additionalProperties: true
                  initialisedAcquirers:
                    type: array
                    items:
                      type: string
                  terminalMessages:
                    type: array
                    items:
                      type: string
                  requestId:
                    type: string
  /terminals/{terminalAlias}/receipts/latest:
    get:
      summary: Get the latest stored receipt bundle for a terminal
      description: Returns the most recent stored receipt bundle for the terminal, whether it came from a transaction flow or from a service flow such as activation, initialisation, transmit, or close day.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest receipt bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalReceiptLatestEnvelope'
  /terminals/{terminalAlias}/receipts:
    get:
      summary: List recent stored receipt bundles for a terminal
      description: Lists recent stored receipt bundles for the terminal across both transaction flows and service flows.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Recent receipt bundles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalReceiptListEnvelope'
  /terminals/{terminalAlias}/payment:
    post:
      summary: Start a payment or pre-authorisation
      description: Uses the configured device callback port for interactive receipt and display handling. Send `cashback` with a positive sale amount for ep2 purchase-with-cashback. The `amount` field is the total EFT amount, and `cashback` must be less than or equal to `amount`.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '200':
          description: Final payment result when responseMode=sync
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionSuccess'
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
  /terminals/{terminalAlias}/refund:
    post:
      summary: Start a terminal-side refund
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '200':
          description: Final refund result when responseMode=sync
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
  /terminals/{terminalAlias}/reversal:
    post:
      summary: Reverse the last terminal transaction
      description: Starts OPI `PaymentReversal`. For Swiss ep2 terminals the original approval code is not sent; if the proxy has a previous successful transaction for the terminal, its amount is reused.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowUpRequest'
      responses:
        '200':
          description: Final reversal result when responseMode=sync
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionSuccess'
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
  /terminals/{terminalAlias}/transmit:
    post:
      summary: Trigger terminal transaction transmit
      description: Triggers OPI `TransmitTrx` to submit completed transactions to the payment systems for processing. Stored service receipts are returned as metadata with file locations.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Final transmit result when responseMode=sync
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalServiceSuccess'
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Preference-Applied:
              schema:
                type: string
                enum: [respond-async]
  /terminals/{terminalAlias}/reprint:
    post:
      summary: Reprint the last receipt from the terminal
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Reprint result
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Preference-Applied:
              schema:
                type: string
                enum: [respond-async]
  /terminals/{terminalAlias}/activate:
    post:
      summary: Activate the terminal session
      description: Triggers terminal login and returns any generated service receipt metadata with receipt file locations.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '200':
          description: Activation result
  /terminals/{terminalAlias}/deactivate:
    post:
      summary: Deactivate the terminal session
      description: Triggers terminal logoff and returns any generated service receipt metadata with receipt file locations.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '200':
          description: Deactivation result
  /terminals/{terminalAlias}/abort:
    post:
      summary: Abort the active terminal flow
      description: Forwards OPI AbortRequest. If the terminal has no active flow to cancel anymore, the terminal may respond with Failure.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '200':
          description: Abort result
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Preference-Applied:
              schema:
                type: string
                enum: [respond-async]
  /terminals/{terminalAlias}/close:
    post:
      summary: Close the terminal day
      description: Triggers OPI `CloseDay` to perform the final balance and log off the terminal at the end of the flow. Generated service receipts are returned as metadata with receipt file locations.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Final close result when responseMode=sync
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalServiceSuccess'
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Preference-Applied:
              schema:
                type: string
                enum: [respond-async]
  /terminals/{terminalAlias}/config:
    post:
      summary: Refresh terminal OS configuration
      description: Triggers OPI `ContactTMS` to fetch the latest terminal OS configuration from the accept host ep2. Generated service receipts are returned as metadata with receipt file locations.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Final configuration result when responseMode=sync
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalServiceSuccess'
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Preference-Applied:
              schema:
                type: string
                enum: [respond-async]
  /terminals/{terminalAlias}/init:
    post:
      summary: Refresh merchant and acquirer initialisation
      description: Triggers OPI `ContactAcq` to fetch the latest merchant-contract initialisation data and brand information from the accept host ep2. Generated service receipts are returned as metadata with receipt file locations.
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Final initialisation result when responseMode=sync
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalServiceSuccess'
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Preference-Applied:
              schema:
                type: string
                enum: [respond-async]
  /terminals/{terminalAlias}/reset:
    post:
      summary: Restart the terminal app
      parameters:
        - name: terminalAlias
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalServiceSuccess'
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Preference-Applied:
              schema:
                type: string
                enum: [respond-async]
  /transactions/{transactionId}:
    get:
      summary: Read a stored transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stored transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionReadEnvelope'
    patch:
      summary: Manually adjust a stored transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '200':
          description: Manual update result
  /transactions/{transactionId}/receipts:
    get:
      summary: Read stored receipts for a transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stored receipt bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptBundleEnvelope'
  /transactions/{transactionId}/capture:
    post:
      summary: Capture a pre-authorised payment
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowUpRequest'
      responses:
        '200':
          description: Final capture result when responseMode=sync
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
  /transactions/{transactionId}/cancel:
    post:
      summary: Cancel a pre-authorised payment
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowUpRequest'
      responses:
        '200':
          description: Final cancel result when responseMode=sync
        '202':
          description: Operation accepted when responseMode=async or Prefer: respond-async is used
          headers:
